<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Francuski</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100&display=swap" rel="stylesheet">
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #5a189a;
        }

        body *{
            background-color: #5a189a;
            font-family: "Montserrat";
            color: white;
        }

        .info{
            margin-top: 100px;
            height: 130px;
            text-align: center;
            font-size: 100px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        input{
            height: 100px;
            width: 500px;
            text-align: center;
            font-size: 64px;
            font-weight: 700; 
            transition: 0.5s;
            background-color: #7b2cbf;
            border: none;
            box-shadow: none;
            overflow: hidden;
            border-bottom: 5px black solid;
        }
        input:focus{
          border:none;
          outline: none;
          border-bottom: 5px #9d4edd solid;
        }

        button{
            height: 100px;
            font-size: 64px;
            font-weight: 900; 
            border-radius: 50px;
            user-select: none;
            border: 0;
        }
        
        

  

        @media screen and (max-width: 700px) {
            .info{margin-top: 50px; font-size: 64px;margin-bottom: 10px;}
            input{height: 100px;font-size: 48px; width: 80vw;}

        }
    </style>
</head>
<body>
<div class="info"></div>
<input type="text" autofocus autocomplete="off">
<button>hint</button>


<script>
let words = {
	"une bosse":"garb",
	"l'épaule": "bark",
	"le coude": "łokieć",
	"le dos":"plecy",
	"la nuque": "kark",
	"le poignet": "nadgarstek",
	"la main": "dłoń",
	"les doigts": "palce",
	"la jambe": "noga",
	"le pied": "stopa",
	"les orteils": "palce u nóg",
	"la taille": "talia",
	"l'avant-bras": "przedramię",
	"le bras":"ramię",
	"les poils": "włosy",
	"le ventre": "brzuch",
	"la poitrine": "klatka piersiowa",
	"le cou": "szyja",
	"la tête": "głowa",
	"le visage": "twarz",
	"les sourcils": "brwi",
	"le front": "czoło",
	"les cheveux": "włosy",
	"les cils": "rzęsy",
	"un œil": "oko",
	"les oreilles": "uszy",
	"les dents": "zęby",
	"les lèvres": "wargi",
	"la bouche": "usta",
	"le menton": "broda",
	"les yeux": "oczy",
	"la joue": "policzek",
	"le nez": "nos",
	"ronde": "okrągła",
	"rectangulaire": "prostokątna",
	"droit": "prosty",
	"tordu": "kręty",
	"large": "szeroki",
	"étroit": "wąski",
	"musclé": "umięśniony",
	"mince": "szczupły",
	"fort": "silny",
	"faible": "słaby",
	"un nez droit":"prosty nos",
	"un visage ronde":"okrągła twarz",
	"un dos etroit":"wąskie plecy",
	"des bras forts":"silne ramiona",
	"la main petite":"mała dłoń",
	"les doigts etroite":"szczupłe palce",
	"le visage grand":"duża buzia"
}

let input = document.querySelector("input")
let info = document.querySelector(".info")
let hint = document.querySelector("button")
let answer = ""
let key

function random(obj) {
  const keys = Object.keys(obj);

  const randomKey = keys[Math.floor(Math.random() * keys.length)];
  const randomValue = obj[randomKey];

  return [randomKey, randomValue];
}

function next(){
    input.value = ""

    key = random(words);
    info.textContent = key[0]
    answer = key[1]
}


input.addEventListener("input", ev => {
    if(input.value.toLowerCase() == answer.toLowerCase()) next()
})

hint.addEventListener("click", ev => {
  alert(answer)
  input.focus()
})
document.addEventListener('keydown', ev => {
 if (!ev.ctrlKey) return;

 if (ev.code === 'Space') {
  alert(answer)
  input.focus()

 }
});

next()



</script>
</body>
</html>
