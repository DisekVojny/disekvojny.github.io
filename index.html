<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Francuski</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100&display=swap" rel="stylesheet">
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #5a189a;
            max-height: 100svh;
        }

        body *{
            background-color: #5a189a;
            font-family: "Montserrat";
            color: white;
        }

        .info{
            margin-top: 100px;
            height: 130px;
            text-align: center;
            font-size: 100px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        input{
            height: 100px;
            width: 500px;
            text-align: center;
            font-size: 64px;
            font-weight: 700; 
            transition: 0.5s;
            background-color: #7b2cbf;
            border: none;
            box-shadow: none;
            overflow: hidden;
            border-bottom: 5px black solid;
        }
        input:focus{
          border:none;
          outline: none;
          border-bottom: 5px #9d4edd solid;
        }

        button{
            height: 100px;
            font-size: 64px;
            font-weight: 900; 
            border-radius: 50px;
            user-select: none;
            border: 0;
        }
        
        

  

        @media screen and (max-width: 700px) {
            .info{margin-top: 50px; font-size: 64px;margin-bottom: 10px;}
            input{height: 100px;font-size: 48px; width: 80vw;}

        }
    </style>
</head>
<body>
<div class="info"></div>
<input type="text" autofocus autocomplete="off">
<button>hint</button>


<script>
let words = {
  "świnia": "un cochon",
  "słoń": "un elephant",
  "żyrafa": "une girafe",
  "baran": "un brebis",
  "owca": "un mouton",
  "królik": "un lapin",
  "szczur": "un rat",
  "tygrys": "un tigre",
  "kogut": "un coq",
  "lew": "un lion",
  "krokodyl": "un crocodile",
  "kot": "un chat",
  "pies": "un chien",
  "indyk": "un dinde",
  "kaczka": "un canard",
  "wielbłąd": "un chameau",
  "gęś": "une oie",
  "jaszczurka": "un lezard",
  "osioł": "un ane",
  "orzeł": "un aigle",
  "moins grand que": "jest mniejszy od",
  "plus grand que": "wiekszy",
  "aussi grand que": "równy",
  "plus agressif que": "bardziej agresywny",
  "moins agressif que": "mniej agresywny",
  "aussi agressif que": "równo agresywny",
  "plus rapide que": "szybszy",
  "moins rapide que": "wolniejszy",
  "aussi rapide que": "tak samo szybki",
  "Le mien est petit": "Mon chien est petit",
  "Le sien est grande": "Son chat est grande",
  "Le leur est gros": "Leur rat est gros",
  "Le notre est mignon": "Notre serpent est mignon",
  "Les votres sont petits": "Vos poissons sont petits",
  "Les leurs sont minces": "Leurs lezards sont minces",
  "Les tiens sont petits": "Tes perroquets sont petits"
}

let input = document.querySelector("input")
let info = document.querySelector(".info")
let hint = document.querySelector("button")
let answer = ""
let key

function random(obj) {
  const keys = Object.keys(obj);

  const randomKey = keys[Math.floor(Math.random() * keys.length)];
  const randomValue = obj[randomKey];

  return [randomKey, randomValue];
}

function next(){
    input.value = ""

    key = random(words);
    info.textContent = key[0]
    answer = key[1]
}


input.addEventListener("input", ev => {
    if(input.value.toLowerCase() == answer.toLowerCase()) next()
})

hint.addEventListener("click", ev => {
  alert(answer)
  input.focus()
})
document.addEventListener('keydown', ev => {
 if (!ev.ctrlKey) return;

 if (ev.code === 'Space') {
  alert(answer)
  input.focus()

 }
});

next()



</script>
</body>
</html>
