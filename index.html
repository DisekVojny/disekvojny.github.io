<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Francuski</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100&display=swap" rel="stylesheet">
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #5a189a;
        }

        body *{
            background-color: #5a189a;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
        }

        .info{
            margin-top: 100px;
            height: 130px;
            text-align: center;
            font-size: 100px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        input{
            height: 100px;
            width: 500px;
            text-align: center;
            font-size: 64px;
            font-weight: 700; 
            transition: 0.5s;
            background-color: #7b2cbf;
            border: none;
            box-shadow: none;
            overflow: hidden;
            border-bottom: 5px black solid;
        }
        input:focus{
          border:none;
          outline: none;
          border-bottom: 5px #9d4edd solid;
        }

        button{
            height: 100px;
            font-size: 64px;
            font-weight: 900; 
            border-radius: 50px;
            user-select: none;
            border: 0;
        }
        
        

  

        @media screen and (max-width: 700px) {
            .info{margin-top: 50px; font-size: 64px;margin-bottom: 10px;}
            input{height: 100px;font-size: 48px;}

        }
    </style>
</head>
<body>
<div class="info"></div>
<input type="text" autofocus autocomplete="off">
<button>hint</button>


<script>
let words = {
	"garb": "une bosse",
	"bark": "l'epaule",
	"łokieć": "le coude",
	"kark": "la nuque",
	"nadgarstek": "le poignet",
	"dłoń": "la main",
	"palce": "les doigts",
	"noga": "la jambe",
	"stopa": "le pied",
	"palce u nóg": "les orteils",
	"talia": "la taille",
	"przedramię": "l'avant-bras",
	"włosy": "les poils",
	"brzuch": "le ventre",
	"klatka piersiowa": "la poitrine",
	"szyja": "le cou",
	"głowa": "la tete",
	"twarz": "le visage",
	"brwi": "les sourcils",
	"czoło": "le front",
	"włosy": "les cheveux",
	"rzęsy": "les cils",
	"oko": "un oeil",
	"uszy": "les oreilles",
	"zęby": "les dents",
	"wargi": "les levres",
	"usta": "la bouche",
	"broda": "le menton",
	"oczy": "les yeux",
	"policzek": "la joue",
	"nos": "le nez",
	"okrągła": "ronde",
	"prostokątna": "rectangulaire",
	"prosty": "droit",
	"kręty": "tordu",
	"szeroki": "large",
	"wąski": "etroit",
	"umięśniony": "muscle",
	"szczupły": "mince",
	"silny": "fort",
	"słaby": "faible"
}

let input = document.querySelector("input")
let info = document.querySelector(".info")
let hint = document.querySelector("button")
let answer = ""
let key

function random(obj) {
  const keys = Object.keys(obj);

  const randomKey = keys[Math.floor(Math.random() * keys.length)];
  const randomValue = obj[randomKey];

  return [randomKey, randomValue];
}

function next(){
    input.value = ""

    key = random(words);
    info.textContent = key[0]
    answer = key[1]
}


input.addEventListener("input", ev => {
    if(input.value.toLowerCase() == answer.toLowerCase()) next()
})

hint.addEventListener("click", ev => alert(answer))
document.addEventListener('keydown', ev => {
 if (!ev.ctrlKey) return;

 if (ev.code === 'Space') {
  alert(answer)
 }
});

next()



</script>
</body>
</html>
