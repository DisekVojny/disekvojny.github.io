<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Francuski</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100&display=swap" rel="stylesheet">
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #5a189a;
            max-height: 100svh;
        }

        body *{
            background-color: #5a189a;
            font-family: "Montserrat";
            color: white;
        }

        .info{
            margin-top: 100px;
            height: 130px;
            text-align: center;
            font-size: 100px;
            font-weight: 900;
            margin-bottom: 10px;
        }

        input{
            height: 100px;
            width: 500px;
            text-align: center;
            font-size: 64px;
            font-weight: 700; 
            transition: 0.5s;
            background-color: #7b2cbf;
            border: none;
            box-shadow: none;
            overflow: hidden;
            border-bottom: 5px black solid;
        }
        input:focus{
          border:none;
          outline: none;
          border-bottom: 5px #9d4edd solid;
        }

        button{
            height: 100px;
            font-size: 64px;
            font-weight: 900; 
            border-radius: 50px;
            user-select: none;
            border: 0;
        }
        
        

  

        @media screen and (max-width: 700px) {
            .info{margin-top: 50px; font-size: 64px;margin-bottom: 10px;}
            input{height: 100px;font-size: 48px; width: 80vw;}

        }
    </style>
</head>
<body>
<div class="info"></div>
<input type="text" autofocus autocomplete="off">
<button>hint</button>


<script>
let words = {
	"mieso":"viande",
	"owoc":"fruit",
	"ryba":"poisson",
	"warzywo":"legume",
	"napoj":"boisson",
	"słodycze":"sucreries",
	"pieczywo":"autres",
	"kotlet schabowy":"une cotelette de porc",
	"jablko":"une pomme",
	"papryka":"un poivron",
	"sok":"un jus",
	"łosoś":"du saumon",
	"czekolada":"du chocolat",
	"chleb":"le pain",
	"sól":"le sel",
	"bagietka":"une baguette",
	"pomarancze":"des oranges",
	"winogrona":"du raisin",
	"pasztet / watrobka":"du foie gras",
	"herbata":"du the",
	"pomidory":"des tomates",
	"makaron":"des pates",
	"mandarynki":"des mandarines",
	"kapusta":"un chou",
	"cukierki":"des bonbons",
	"truskawki":"des fraises",
	"gruszka":"une poire",
	"marchewki":"des carrotes",
	"jajka":"des oeufs",
	"oliwa z oliwek":"de l'huile d'olive",
	"filet wołowy":"un filet de boeuf",
	"cebula":"des oignons",
	"czosnek":"de l'ail",
	"ser":"le fromage",
	"ciasto":"un gateau",
	"szynka":"du jambon",
	"biała szynka":"du jambon blanc",
	"banan":"une bannane",
	"ogórek":"un concombre",
	"kawa":"du cafe",
	"tarta":"une tarte",
	"tuńczyk":"du thon",
	"sardynki":"des sardines",
	"woda":"l'eau",
	"mleko":"le lait",
	"wędlina":"la charcuterie",
	"kiełbasa":"une saucisse",
	"deser":"le dessert",
	"zupa":"la soupe",
	"ryż":"du riz",
	"danie":"un plat",
	"warzywniak":"le magasin et druits et legumes",
	"sklep mięsny":"la boucherie",
	"sklep z serami":"la fromagerie",
	"piekarnia":"la boulangerie",
	"sklep rybny":"la poissonnerie",
	"cukiernia":"la patisserie"
}

let input = document.querySelector("input")
let info = document.querySelector(".info")
let hint = document.querySelector("button")
let answer = ""
let key

function random(obj) {
  const keys = Object.keys(obj);

  const randomKey = keys[Math.floor(Math.random() * keys.length)];
  const randomValue = obj[randomKey];

  return [randomKey, randomValue];
}

function next(){
    input.value = ""

    key = random(words);
    info.textContent = key[0]
    answer = key[1]
}


input.addEventListener("input", ev => {
    if(input.value.toLowerCase() == answer.toLowerCase()) next()
})

hint.addEventListener("click", ev => {
  alert(answer)
  input.focus()
})
document.addEventListener('keydown', ev => {
 if (!ev.ctrlKey) return;

 if (ev.code === 'Space') {
  alert(answer)
  input.focus()

 }
});

next()



</script>
</body>
</html>
