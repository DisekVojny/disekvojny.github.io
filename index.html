<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Francuski</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info{
            margin-top: 100px;
            height: 130px;
            text-align: center;
            font-size: 100px;
            font-weight: 900;
        }

        input{
            height: 150px;
            text-align: center;
            font-size: 64px;
            font-weight: 900; 
            transition: 0.5s;
            border: 3px solid black;
            border-radius: 10px;
        }

        input:focus{
            border-radius: 50px;
        }

        button{
            height: 100px;
            font-size: 64px;
            font-weight: 900; 
            border-radius: 50px;
            /* box-shadow: 0 8px 16px 0 rgba(0,0,0,0.2), 0 6px 20px 0 rgba(0,0,0,0.19); */
            user-select: none;
            border: 0;
            background-color: white;
        }

        @media screen and (max-width: 700px) {
            .info{margin-top: 50px; font-size: 64px;margin-bottom: 10px;}
            input{height: 100px;font-size: 48px;}

        }
    </style>
</head>
<body>
<div class="info"></div>
<input type="text" autofocus>
<button>hint</button>


<script>
let words = {
	"garb": "une bosse",
	"bark": "l'épaule",
	"łokieć": "le coude",
	"kark": "la nuque",
	"nadgarstek": "le poignet",
	"dłoń": "la main",
	"palce": "les doigts",
	"noga": "la jambe",
	"stopa": "le pied",
	"palce u nóg": "les orteils",
	"talia": "la taille",
	"przedramię": "l'avant-bras",
	"włosy": "les poils",
	"brzuch": "le ventre",
	"klatka piersiowa": "la poitrine",
	"szyja": "le cou",
	"głowa": "la tête",
	"twarz": "le visage",
	"brwi": "les sourcils",
	"czoło": "le front",
	"włosy": "les cheveux",
	"rzęsy": "les cils",
	"oko": "un œil",
	"uszy": "les oreilles",
	"zęby": "les dents",
	"wargi": "les lèvres",
	"usta": "la bouche",
	"broda": "le menton",
	"oczy": "les yeux",
	"policzek": "la joue",
	"nos": "le nez",
	"okrągła": "ronde",
	"prostokątna": "rectangulaire",
	"prosty": "droit",
	"kręty": "tordu",
	"szeroki": "large",
	"wąski": "étroit",
	"umięśniony": "musclé",
	"szczupły": "mince",
	"silny": "fort",
	"słaby": "faible"
}

let input = document.querySelector("input")
let info = document.querySelector(".info")
let hint = document.querySelector("button")
let answer = ""
let key

function random(obj) {
  const keys = Object.keys(obj);

  const randomKey = keys[Math.floor(Math.random() * keys.length)];
  const randomValue = obj[randomKey];

  return [randomKey, randomValue];
}

function next(){
    input.value = ""

    key = random(words);
    info.textContent = key[0]
    answer = key[1]
}


input.addEventListener("input", ev => {
    if(input.value == answer) next()
})

hint.addEventListener("click", ev => alert(answer))
document.addEventListener('keydown', ev => {
 if (!ev.ctrlKey) return;

 if (ev.code === 'Space') {
  alert(answer)
 }
});

next()



</script>
</body>
</html>
